name: app_taurostockv1
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.0
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  fl_chart: ^0.45.0
  image_picker: ^1.0.4
  barcode_scan2: ^4.3.2
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1  # ← AGREGADO

# Configuración del icono de la app
flutter_launcher_icons:
  android: true
  ios: false  # ← Cambia a true si también quieres para iOS
  image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true

  # Para usar la imagen en la app (opcional)
  assets:
    - assets/icon/
    